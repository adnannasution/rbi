const CORR_ENV = {
  sulfidation:{
    name:"Sulfidation (H₂S/Sulfur)",ref:"API 571 §5.1.1.3",
    calc:(T,H2S,mat)=>{
      if(T<260) return {rate:0,note:"Below 260°C threshold"};
      const b=mat==="carbon_steel"?0.254*Math.exp(0.0055*(T-260)):mat==="5Cr"?0.127*Math.exp(0.005*(T-288)):mat==="9Cr"?0.076*Math.exp(0.004*(T-316)):0.025;
      return {rate:Math.min(b*Math.max(0.1,Math.sqrt(H2S)),5),note:`McConomy at ${T}°C, ${H2S}% H₂S`};
    }
  },
  naphthenic:{
    name:"Naphthenic Acid",ref:"API 571 §5.1.1.2",
    calc:(T,TAN,vel,mat)=>{
      if(T<220||T>400) return {rate:0,note:"Outside 220-400°C range"};
      if(TAN<0.5) return {rate:0.05,note:"Low TAN"};
      const b=mat==="carbon_steel"?0.1*TAN*Math.exp(0.003*(T-220)):0.01*TAN;
      return {rate:Math.min(b*(vel>30?2:vel>15?1.5:1),5),note:`TAN=${TAN}, vel factor applied`};
    }
  },
  co2:{
    name:"CO₂ Corrosion (Sweet)",ref:"API 571 §5.1.2.2",
    calc:(T,pp,pH,mat)=>{
      if(mat!=="carbon_steel") return {rate:0.01,note:"CRA resistant"};
      return {rate:Math.min(Math.max(2.28*Math.pow(pp/100,0.62)*Math.exp(-1710/(T+273))*Math.pow(10,0.32*(4-Math.min(pH,6))),0),10),note:`de Waard-Milliams, CO₂ pp=${pp}kPa`};
    }
  },
  hcl:{
    name:"HCl Corrosion",ref:"API 571 §5.1.1.1",
    calc:(T,ppm,water,mat)=>{
      if(!water) return {rate:0,note:"No free water"};
      if(mat!=="carbon_steel") return {rate:ppm>100?0.5:0.05,note:"CRA"};
      const r=ppm>200?2.5:ppm>50?1:ppm>20?0.5:0.1;
      return {rate:r*(T>120?0.5:T>80?1:1.5),note:`Dewpoint at ${T}°C`};
    }
  },
  wet_h2s:{
    name:"Wet H₂S Cracking",ref:"API 571 §5.1.2.3",
    calc:(T,pp,pH)=>{
      if(T>150) return {rate:0,note:"Above wet H₂S range"};
      return {rate:pp>100?0.5:0.15,note:`SSC:${pp>300?"HIGH":pp>50?"MED":"LOW"} HIC:${pH<4?"HIGH":pH<5.5?"MED":"LOW"}`,ssc:pp>300?"high":pp>50?"medium":"low",hic:pH<4?"high":pH<5.5?"medium":"low"};
    }
  },
  amine:{
    name:"Amine Corrosion",ref:"API 571 §5.1.2.8",
    calc:(T,type,conc,vel,mat)=>{
      if(mat!=="carbon_steel") return {rate:0.05,note:"CRA"};
      const bf=type==="MEA"?1.5:type==="DEA"?1:0.7;
      return {rate:Math.min(bf*(conc/20)*(vel>6?2:vel>3?1.5:1)*(T>100?1.5:1),3),note:`${type} ${conc}%`};
    }
  },
  atmospheric:{
    name:"Atmospheric/External",ref:"API 571 §4.2.1",
    calc:(clim,ins,Top,coat)=>{
      const b=clim==="marine"?0.15:clim==="humid"?0.08:clim==="temperate"?0.03:0.01;
      const i=ins&&Top>=-12&&Top<=175?5:ins?2:1;
      const c=coat==="good"?0.1:coat==="fair"?0.5:1;
      return {rate:b*i*c,note:`${clim}, CUI factor=${i}`};
    }
  },
};

function calcAllDF(eq, insp) {
  const cr=eq.corrRate||0.1, age=eq.age||10, tN=eq.tNom||20, tM=eq.tMin||10;
  const wl=cr*age, Art=Math.min(wl/tN,1.5), tA=Math.max(tN-wl,0);
  const rl=cr>0&&tA>tM?(tA-tM)/cr:cr>0?0:999;

  const ic=(type)=>(insp||[]).filter(i=>i.type===type).reduce((c,i)=>c*Math.max(IE[i.eff]?.f||1,0.01),1);

  const thinB=Art<=0.1?1+Art*10:Art<=0.2?2+(Art-0.1)*30:Art<=0.3?5+(Art-0.2)*80:Art<=0.5?13+(Art-0.3)*200:Art<=0.8?53+(Art-0.5)*500:203+(Art-0.8)*5000;
  const dfThin={name:"Thinning",df:Math.max(thinB*ic("thinning"),1),base:thinB,ic:ic("thinning")};

  const extB=(eq.hasInsul?(eq.climate==="marine"?200:eq.climate==="humid"?100:50):(eq.climate==="marine"?30:eq.climate==="humid"?15:5))*(eq.coat==="good"?0.1:eq.coat==="fair"?0.5:1);
  const dfExt={name:"External Corr",df:Math.max(extB*ic("external"),1),base:extB};

  const cuiOn=eq.hasInsul&&eq.T>=-12&&eq.T<=175;
  const cuiB=cuiOn?(eq.climate==="marine"?300:eq.climate==="humid"?150:60)*(eq.coat==="good"?0.1:eq.coat==="fair"?0.5:1):0;
  const dfCUI={name:"CUI",df:Math.max(cuiB*ic("external"),1),base:cuiB};

  const sccM={none:1,low:10,medium:100,high:1000,"very high":5000};
  const dfSCC={name:"SCC",df:Math.max((sccM[eq.scc]||1)*ic("cracking"),1),base:sccM[eq.scc]||1};

  let hthaB=1;
  if(eq.h2pp>0){const thr=eq.matGrp==="carbon_steel"?200+50*Math.log10(Math.max(eq.h2pp/100,0.1)):eq.matGrp==="low_alloy"||eq.matGrp==="2.25Cr"?350+35*Math.log10(Math.max(eq.h2pp/100,0.1)):999;hthaB=eq.T>=thr?5000:eq.T>=thr*0.9?1000:eq.T>=thr*0.8?100:1;}
  const dfHTHA={name:"HTHA",df:Math.max(hthaB,1),base:hthaB};

  const britM=(eq.matGrp==="carbon_steel"||eq.matGrp==="low_alloy")?(eq.T-(eq.pwht?eq.refT-10:eq.refT+20))>30?1:(eq.T-(eq.pwht?eq.refT-10:eq.refT+20))>0?50:500:1;
  const dfBrit={name:"Brittle Frac",df:Math.max(britM,1),base:britM};

  const e885=eq.matGrp==="stainless_400"&&eq.T>=371&&eq.T<=538?{name:"885°F Emb",df:Math.max(age>20?500:age>10?100:20,1)}:{name:"885°F Emb",df:1};
  const sigm=((eq.matGrp==="stainless_300"||eq.matGrp==="stainless_duplex")&&eq.T>=593)?{name:"Sigma Phase",df:Math.max(age>20?300:80,1)}:{name:"Sigma Phase",df:1};
  const temp=eq.matGrp==="low_alloy"&&eq.T>=343?{name:"Temper Emb",df:Math.max(eq.T>480&&age>15?500:100,1)}:{name:"Temper Emb",df:1};
  const dfFat=eq.cyclicService?{name:"Fatigue",df:50}:{name:"Fatigue",df:1};

  const all=[dfThin,dfExt,dfCUI,dfSCC,dfHTHA,dfBrit,e885,sigm,temp,dfFat];
  const tot=Math.max(all.reduce((s,d)=>s+d.df,0)-(all.length-1),1);
  return {all,tot,Art,wl,tA,rl,active:all.filter(d=>d.df>1)};
}

function calcFMS(sc){const t=MGMT_AREAS.reduce((s,a)=>s+(sc[a.id]||0),0);const ps=t/10;return{fms:Math.max(0.1,Math.min(Math.pow(10,-0.02*ps+1),10)),ps,t};}

function calcCOF(fl,P,T,inv,comp,det,iso){
  const f=FLUIDS[fl],g=GFF[comp];if(!f||!g)return{ca:0,fin:0,caMap:{}};
  const mit=Math.max(({A:.25,B:.5,C:1}[det]||1)*({A:.25,B:.5,C:1}[iso]||1),0.1);
  const hs={small:.25,medium:1,large:4,rupture:16};
  let wCA=0;const caMap={};
  ["small","medium","large","rupture"].forEach(sz=>{
    if(g[sz[0]]<=0&&sz!=="small"){caMap[sz]=0;return;}
    const gv=sz==="small"?g.s:sz==="medium"?g.m:sz==="large"?g.l:g.r;
    if(gv<=0){caMap[sz]=0;return;}
    const ar=Math.PI*Math.pow(hs[sz]*0.0254/2,2);
    const dens=f.ph==="gas"?(P*f.mw)/(8314*(T+273)):700;
    const vel=Math.sqrt(2*Math.max(P-101.325,10)*1000/dens);
    const rate=0.61*ar*dens*vel;
    const mass=Math.min(rate*180,inv);
    const X=sz==="rupture"?mass:rate;
    let ca=f.fl?(f.ph==="gas"?30*Math.pow(X,0.65):15*Math.pow(X,0.55)):0;
    if(f.tx)ca=Math.max(ca,100*Math.pow(mass,0.7));
    ca*=mit;caMap[sz]=ca;wCA+=gv*ca;
  });
  wCA/=g.t;
  return{ca:wCA,fin:inv*2+50000*14+wCA*10,mit,caMap};
}

const rCat=(p,c)=>{const pc=p<=3.06e-5?1:p<=3.06e-4?2:p<=3.06e-3?3:p<=3.06e-2?4:5;const cc=c<=100?"A":c<=1000?"B":c<=10000?"C":c<=100000?"D":"E";const cn={A:1,B:2,C:3,D:4,E:5}[cc];const s=pc+cn;return{pc,cc,cn,s,lv:s<=3?"Low":s<=5?"Medium":s<=7?"Medium-High":"High"};};

function calcInspPlan(pof,cof,dfTot,cr,tA,tM,target,comp,fms){
  const gff=GFF[comp]?.t||3.06e-5;
  const pts=[];
  for(let y=0.5;y<=20;y+=0.5){
    const g=1+Math.pow(y/5,1.8);
    const fp=Math.min(gff*fms*dfTot*g,1);
    const fr=fp*cof;
    const frl=cr>0?Math.max((tA-cr*y-tM)/cr,0):999;
    pts.push({year:y,pof:fp,risk:fr,rl:frl,df:dfTot*g});
  }
  const ex=pts.findIndex(p=>p.risk>target);
  const mx=ex>=0?Math.min(pts[ex].year,10):10;
  const re=pof*cof>target*2?"A":pof*cof>target?"B":pof*cof>target*0.5?"C":"D";
  return{pts,mx,re,cr:pof*cof,tgt:target};
}

const TT={contentStyle:{background:S.c2,border:`1px solid ${S.bd}`,borderRadius:6,fontSize:11,color:S.tx}};

// Risk Matrix
function RiskMx({items,hl}){
  const rows=[5,4,3,2,1],cols=["A","B","C","D","E"];
  const cc=(r,c)=>{const s=r+{A:1,B:2,C:3,D:4,E:5}[c];return s<=3?"#065f46":s<=5?"#78350f":s<=7?"#9a3412":"#991b1b";};
  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"28px repeat(5,1fr)",gap:2}}>
        <div />{cols.map(c=><div key={c} style={{textAlign:"center",fontSize:10,fontWeight:700,color:S.dm}}>{c}</div>)}
        {rows.map(r=><>
          <div key={`l${r}`} style={{display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:S.dm}}>{r}</div>
          {cols.map(c=>{const ci=(items||[]).filter(i=>i.risk.pc===r&&i.risk.cc===c);const on=hl&&hl.risk?.pc===r&&hl.risk?.cc===c;
            return(<div key={`${r}${c}`} style={{background:cc(r,c),borderRadius:3,minHeight:30,padding:2,display:"flex",flexWrap:"wrap",alignItems:"center",justifyContent:"center",gap:2,border:on?"2px solid #fff":"1px solid rgba(255,255,255,0.05)"}}>
              {ci.map((it,i)=><div key={i} title={it.id} style={{width:6,height:6,background:"#fff",borderRadius:"50%",opacity:on&&it.id===hl.id?1:0.5}} />)}
            </div>);})}
        </>)}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:S.mt,marginTop:3}}><span>↑ POF</span><span>COF →</span></div>
    </div>
  );
}

function App(){
  const [tab,setTab]=useState("analytics");
  const [eqList,setEqList]=useState(INIT_EQ);
  const [selId,setSelId]=useState(null);
  const [mgmt,setMgmt]=useState({lead:50,psi:60,pha:70,moc:55,proc:60,safe:60,train:75,mi:90,pssr:40,emerg:45,inc:55,contr:30,audit:25});
  const [showAdd,setShowAdd]=useState(false);
  const [riskTgt,setRiskTgt]=useState(5.0);
  const [corrEnv,setCorrEnv]=useState("sulfidation");
  const [corrIn,setCorrIn]=useState({temperature:300,h2s_pct:1,material:"carbon_steel",tan:1.0,velocity:5,co2_pp:200,ph:5,hcl_ppm:50,has_water:true,climate:"humid",has_insulation:false,operating_temp:80,coating:"fair",amine_type:"DEA",concentration:20});
  const [newEq,setNewEq]=useState({id:"",name:"",unit:"",comp:"DRUM",tNom:20,tMin:10,corrRate:0.15,age:10,conf:"medium",fluid:"C6",P:1000,T:100,T_min:0,inv:2000,matGrp:"carbon_steel",matSpec:"",scc:"low",hasInsul:false,climate:"humid",coat:"fair",det:"B",iso:"B",h2pp:0,refT:-20,pwht:true,cyclicService:false,hasH2S:false,hasCaustic:false,hasAmine:false,hasCl:false,hasCO2:false,hasWater:false,TAN:0,velocity:3,insp:[]});

  const fmsR=useMemo(()=>calcFMS(mgmt),[mgmt]);
  const assessed=useMemo(()=>{
    return eqList.map(eq=>{
      const df=calcAllDF(eq,eq.insp);
      const g=GFF[eq.comp];if(!g)return null;
      const pof=Math.min(g.t*fmsR.fms*df.tot,1);
      const cofR=calcCOF(eq.fluid,eq.P,eq.T,eq.inv,eq.comp,eq.det,eq.iso);
      const risk=rCat(pof,cofR.ca);
      const rFin=pof*cofR.fin;
      return{...eq,...df,pof,cof:cofR.ca,cofFin:cofR.fin,cofMit:cofR.mit,cofMap:cofR.caMap,risk,riskVal:pof*cofR.ca,riskFin:rFin};
    }).filter(Boolean).sort((a,b)=>b.riskFin-a.riskFin);
  },[eqList,fmsR.fms]);

  const sel=assessed.find(a=>a.id===selId);
  const updNew=(k,v)=>setNewEq(p=>({...p,[k]:v}));
  const addEq=()=>{if(!newEq.id||!newEq.name)return;setEqList(p=>[...p,{...newEq}]);setShowAdd(false);};
  const rmEq=id=>{setEqList(p=>p.filter(e=>e.id!==id));if(selId===id)setSelId(null);};

  // Inspection CRUD for selected equipment
  const addInsp=()=>{if(!selId)return;setEqList(p=>p.map(eq=>eq.id===selId?{...eq,insp:[...eq.insp,{id:Date.now(),eff:"C",type:"thinning",date:new Date().toISOString().slice(0,10),method:"",desc:""}]}:eq));};
  const rmInsp=(iid)=>{setEqList(p=>p.map(eq=>eq.id===selId?{...eq,insp:eq.insp.filter(i=>i.id!==iid)}:eq));};
  const updInsp=(iid,k,v)=>{setEqList(p=>p.map(eq=>eq.id===selId?{...eq,insp:eq.insp.map(i=>i.id===iid?{...i,[k]:v}:i)}:eq));};

  const stats=useMemo(()=>({n:assessed.length,hi:assessed.filter(a=>a.risk.lv==="High").length,mh:assessed.filter(a=>a.risk.lv==="Medium-High").length,md:assessed.filter(a=>a.risk.lv==="Medium").length,lo:assessed.filter(a=>a.risk.lv==="Low").length,tr:assessed.reduce((s,a)=>s+a.riskFin,0),mrl:assessed.length?Math.min(...assessed.map(a=>a.rl)):0}),[assessed]);

  // ================================================================
  // TAB 1: ANALYTICS DASHBOARD
  // ================================================================
  const renderAnalytics=()=>{
    const rdist=[{name:"High",value:stats.hi,color:"#ef4444"},{name:"Med-Hi",value:stats.mh,color:"#f97316"},{name:"Medium",value:stats.md,color:"#eab308"},{name:"Low",value:stats.lo,color:"#10b981"}].filter(d=>d.value>0);
    const pareto=assessed.slice(0,10).map(a=>({name:a.id,risk:Math.round(a.riskFin),lv:a.risk.lv}));
    const cum=pareto.reduce((acc,d,i)=>{const p=i>0?acc[i-1].c:0;acc.push({...d,c:p+d.risk});return acc;},[]);
    const tt=cum.length?cum[cum.length-1].c:1;
    const pw=cum.map(d=>({...d,pct:Math.round(d.c/tt*100)}));
    const dfBk=assessed.map(a=>({name:a.id,Thin:a.all.find(d=>d.name==="Thinning")?.df||1,Ext:a.all.find(d=>d.name==="External Corr")?.df||1,CUI:a.all.find(d=>d.name==="CUI")?.df||1,SCC:a.all.find(d=>d.name==="SCC")?.df||1,HTHA:a.all.find(d=>d.name==="HTHA")?.df||1}));
    const rlD=assessed.map(a=>({name:a.id,rl:Math.min(a.rl,30),lv:a.risk.lv})).sort((a,b)=>a.rl-b.rl);
    const uRisk={};assessed.forEach(a=>{if(!uRisk[a.unit])uRisk[a.unit]={unit:a.unit,risk:0,cnt:0};uRisk[a.unit].risk+=a.riskFin;uRisk[a.unit].cnt++;});
    return(
      <div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
          <Box w={95} label="Equipment" value={stats.n} color="#3b82f6" /><Box w={95} label="High Risk" value={stats.hi} color="#ef4444" /><Box w={95} label="Med-High" value={stats.mh} color="#f97316" /><Box w={95} label="Medium" value={stats.md} color="#eab308" /><Box w={95} label="Low" value={stats.lo} color="#10b981" /><Box w={110} label="Total Risk" value={`$${(stats.tr/1000).toFixed(0)}K`} unit="/year" /><Box w={95} label="Min RL" value={`${stats.mrl.toFixed(1)}yr`} color={stats.mrl<3?"#ef4444":"#10b981"} /><Box w={95} label="FMS" value={fmsR.fms.toFixed(3)} color={fmsR.fms>1?"#ef4444":"#10b981"} />
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Card title="Risk Distribution" accent="#3b82f6"><ResponsiveContainer width="100%" height={170}><PieChart><Pie data={rdist} cx="50%" cy="50%" outerRadius={65} innerRadius={38} dataKey="value" label={({name,value})=>`${name}:${value}`}>{rdist.map((d,i)=><Cell key={i} fill={d.color}/>)}</Pie><Tooltip {...TT}/></PieChart></ResponsiveContainer></Card>
          <Card title="Risk Pareto ($/yr)" accent="#f59e0b"><ResponsiveContainer width="100%" height={170}><BarChart data={pw} margin={{top:5,right:30,left:0,bottom:5}}><XAxis dataKey="name" tick={{fontSize:9,fill:S.dm}}/><YAxis yAxisId="l" tick={{fontSize:9,fill:S.dm}}/><YAxis yAxisId="r" orientation="right" domain={[0,100]} tick={{fontSize:9,fill:S.dm}}/><Tooltip {...TT}/><Bar yAxisId="l" dataKey="risk" fill="#f59e0b" radius={[3,3,0,0]}/><Line yAxisId="r" type="monotone" dataKey="pct" stroke="#ef4444" strokeWidth={2} dot={{r:2}}/></BarChart></ResponsiveContainer></Card>
          <Card title="Damage Factor Breakdown (Log)" accent="#8b5cf6"><ResponsiveContainer width="100%" height={170}><BarChart data={dfBk} margin={{top:5,right:5,left:0,bottom:5}}><XAxis dataKey="name" tick={{fontSize:9,fill:S.dm}}/><YAxis tick={{fontSize:9,fill:S.dm}} scale="log" domain={[1,'auto']}/><Tooltip {...TT}/><Bar dataKey="Thin" stackId="a" fill="#3b82f6"/><Bar dataKey="Ext" stackId="a" fill="#06b6d4"/><Bar dataKey="CUI" stackId="a" fill="#8b5cf6"/><Bar dataKey="SCC" stackId="a" fill="#ec4899"/><Bar dataKey="HTHA" stackId="a" fill="#ef4444"/><Legend wrapperStyle={{fontSize:9}}/></BarChart></ResponsiveContainer></Card>
          <Card title="Remaining Life (years)" accent="#10b981"><ResponsiveContainer width="100%" height={170}><BarChart data={rlD} margin={{top:5,right:5,left:0,bottom:5}}><XAxis dataKey="name" tick={{fontSize:9,fill:S.dm}}/><YAxis tick={{fontSize:9,fill:S.dm}}/><CartesianGrid strokeDasharray="3 3" stroke={S.bd}/><Tooltip {...TT}/><Bar dataKey="rl" radius={[3,3,0,0]}>{rlD.map((d,i)=><Cell key={i} fill={d.rl<3?"#ef4444":d.rl<5?"#f97316":d.rl<10?"#eab308":"#10b981"}/>)}</Bar></BarChart></ResponsiveContainer></Card>
          <Card title="5×5 Risk Matrix" accent={S.ac}><RiskMx items={assessed} hl={sel}/><div style={{marginTop:8,display:"flex",gap:6,flexWrap:"wrap"}}>{[["Low","#065f46"],["Med","#78350f"],["M-Hi","#9a3412"],["High","#991b1b"]].map(([l,c])=><div key={l} style={{display:"flex",alignItems:"center",gap:3,fontSize:9,color:S.mt}}><div style={{width:8,height:8,background:c,borderRadius:2}}/>{l}</div>)}</div></Card>
          <Card title="Risk by Unit" accent="#06b6d4"><ResponsiveContainer width="100%" height={170}><BarChart data={Object.values(uRisk).sort((a,b)=>b.risk-a.risk)} layout="vertical" margin={{top:5,right:20,left:60,bottom:5}}><XAxis type="number" tick={{fontSize:9,fill:S.dm}}/><YAxis type="category" dataKey="unit" tick={{fontSize:10,fill:S.tx}}/><Tooltip {...TT}/><Bar dataKey="risk" fill="#06b6d4" radius={[0,3,3,0]} name="Risk ($/yr)"/></BarChart></ResponsiveContainer></Card>
        </div>
      </div>
    );
  };

  // ================================================================
  // TAB 2: DATA ENTRY + EQUIPMENT REGISTRY
  // ================================================================
  const renderEntry=()=>(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <span style={{fontSize:13,fontWeight:700,color:S.tx}}>Equipment Registry ({eqList.length})</span>
        <button onClick={()=>setShowAdd(!showAdd)} style={{padding:"6px 14px",background:showAdd?"#991b1b":"#1e40af",border:"none",borderRadius:5,color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer"}}>{showAdd?"✕ Cancel":"+ Add Equipment"}</button>
      </div>
      {showAdd&&(
        <div style={{background:S.c1,borderRadius:8,border:`2px solid #1e40af`,padding:14,marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:"#60a5fa",marginBottom:10,textTransform:"uppercase"}}>New Equipment</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"0 12px"}}>
            <Inp label="Tag *" value={newEq.id} onChange={v=>updNew("id",v)} type="text" placeholder="V-101" />

            <Inp label="Nom. Thick (mm)" value={newEq.tNom} onChange={v=>updNew("tNom",v)} step={0.1}/><Inp label="Min Req'd (mm)" value={newEq.tMin} onChange={v=>updNew("tMin",v)} step={0.1}/>
            <Inp label="Corr Rate (mm/yr)" value={newEq.corrRate} onChange={v=>updNew("corrRate",v)} step={0.01} hint="Use Corr Rate Calc"/><Inp label="Age (yr)" value={newEq.age} onChange={v=>updNew("age",v)} step={1}/>
            <Sel label="Material" value={newEq.matGrp} onChange={v=>updNew("matGrp",v)} options={[{v:"carbon_steel",l:"Carbon Steel"},{v:"low_alloy",l:"Low Alloy"},{v:"2.25Cr",l:"2.25Cr-1Mo"},{v:"stainless_300",l:"300 SS"},{v:"stainless_400",l:"400 SS"},{v:"stainless_duplex",l:"Duplex"},{v:"nickel_alloy",l:"Nickel"}]} />

            <Inp label="H₂ pp (kPa)" value={newEq.h2pp} onChange={v=>updNew("h2pp",v)} hint="For HTHA"/><Inp label="TAN" value={newEq.TAN} onChange={v=>updNew("TAN",v)} step={0.1}/>
            <Sel label="Detection" value={newEq.det} onChange={v=>updNew("det",v)} options={[{v:"A",l:"A-Continuous"},{v:"B",l:"B-Periodic"},{v:"C",l:"C-None"}]} />
            <Sel label="Isolation" value={newEq.iso} onChange={v=>updNew("iso",v)} options={[{v:"A",l:"A-Remote"},{v:"B",l:"B-Manual"},{v:"C",l:"C-None"}]} />
            <Sel label="Climate" value={newEq.climate} onChange={v=>updNew("climate",v)} options={["arid","temperate","humid","marine"].map(v=>({v,l:v}))} />
            <Sel label="Coating" value={newEq.coat} onChange={v=>updNew("coat",v)} options={[{v:"good",l:"Good"},{v:"fair",l:"Fair"},{v:"poor",l:"Poor"}]} />
          </div>

                      <td style={{padding:"4px 6px"}}><input value={ins.desc} onChange={e=>updInsp(ins.id,"desc",e.target.value)} placeholder="Notes" style={{background:S.ib,border:`1px solid ${S.bd}`,borderRadius:3,color:S.tx,padding:"3px 5px",fontSize:11,width:"100%",boxSizing:"border-box"}}/></td>
                      <td style={{padding:"4px 6px"}}><button onClick={()=>rmInsp(ins.id)} style={{background:"transparent",border:`1px solid #991b1b`,color:"#ef4444",borderRadius:3,padding:"2px 5px",cursor:"pointer",fontSize:9}}>✕</button></td>

    );
  };

  // ================================================================
  // TAB 4: DAMAGE MECHANISM SCREENING
  // ================================================================

                <div key={i} style={{background:"#080d17",borderRadius:6,padding:8,border:`1px solid ${d.df>10?`${S.ac}40`:S.bd}`,textAlign:"center"}}>

  // ================================================================
  // TAB 5: CORROSION RATE CALCULATOR
  // ================================================================
  const renderCorr=()=>{
    const env=CORR_ENV[corrEnv];
    let res;
    try{
      if(corrEnv==="sulfidation")res=env.calc(corrIn.temperature,corrIn.h2s_pct,corrIn.material);
      else if(corrEnv==="naphthenic")res=env.calc(corrIn.temperature,corrIn.tan,corrIn.velocity,corrIn.material);
      else if(corrEnv==="co2")res=env.calc(corrIn.temperature,corrIn.co2_pp,corrIn.ph,corrIn.material);
      else if(corrEnv==="hcl")res=env.calc(corrIn.temperature,corrIn.hcl_ppm,corrIn.has_water,corrIn.material);
      else if(corrEnv==="wet_h2s")res=env.calc(corrIn.temperature,corrIn.h2s_pct*1000,corrIn.ph);
      else if(corrEnv==="amine")res=env.calc(corrIn.temperature,corrIn.amine_type,corrIn.concentration,corrIn.velocity,corrIn.material);
      else if(corrEnv==="atmospheric")res=env.calc(corrIn.climate,corrIn.has_insulation,corrIn.operating_temp,corrIn.coating);
    }catch(e){res={rate:0,note:e.message};}

    const sens=[];for(let t=100;t<=500;t+=20){let r;try{if(corrEnv==="sulfidation")r=CORR_ENV.sulfidation.calc(t,corrIn.h2s_pct,corrIn.material);else if(corrEnv==="naphthenic")r=CORR_ENV.naphthenic.calc(t,corrIn.tan,corrIn.velocity,corrIn.material);else r={rate:0};}catch(e){r={rate:0};}sens.push({temp:t,rate:r.rate});}

    return(
      <div style={{display:"grid",gridTemplateColumns:"320px 1fr",gap:12}}>
        <div>
          <Card title="Environment" accent="#3b82f6">
            <Sel label="Mechanism" value={corrEnv} onChange={setCorrEnv} options={Object.entries(CORR_ENV).map(([k,v])=>({v:k,l:v.name}))} hint={env?.ref}/>
          </Card>
          <div style={{marginTop:12}}><Card title="Inputs" accent="#8b5cf6">
            <Sel label="Material" value={corrIn.material} onChange={v=>setCorrIn(p=>({...p,material:v}))} options={[{v:"carbon_steel",l:"Carbon Steel"},{v:"5Cr",l:"5Cr"},{v:"9Cr",l:"9Cr"},{v:"316SS",l:"316SS"},{v:"low_alloy",l:"Low Alloy"}]}/>
            <Inp label="Temperature (°C)" value={corrIn.temperature} onChange={v=>setCorrIn(p=>({...p,temperature:v}))}/>
            {(corrEnv==="sulfidation"||corrEnv==="wet_h2s")&&<Inp label="H₂S (%)" value={corrIn.h2s_pct} onChange={v=>setCorrIn(p=>({...p,h2s_pct:v}))} step={0.1}/>}
            {corrEnv==="naphthenic"&&<><Inp label="TAN" value={corrIn.tan} onChange={v=>setCorrIn(p=>({...p,tan:v}))} step={0.1}/><Inp label="Velocity (m/s)" value={corrIn.velocity} onChange={v=>setCorrIn(p=>({...p,velocity:v}))}/></>}
            {corrEnv==="co2"&&<><Inp label="CO₂ pp (kPa)" value={corrIn.co2_pp} onChange={v=>setCorrIn(p=>({...p,co2_pp:v}))}/><Inp label="pH" value={corrIn.ph} onChange={v=>setCorrIn(p=>({...p,ph:v}))} step={0.1}/></>}
            {corrEnv==="hcl"&&<Inp label="HCl (ppm)" value={corrIn.hcl_ppm} onChange={v=>setCorrIn(p=>({...p,hcl_ppm:v}))}/>}
            {corrEnv==="atmospheric"&&<><Sel label="Climate" value={corrIn.climate} onChange={v=>setCorrIn(p=>({...p,climate:v}))} options={["arid","temperate","humid","marine"].map(v=>({v,l:v}))}/><Chk label="Insulated" checked={corrIn.has_insulation} onChange={v=>setCorrIn(p=>({...p,has_insulation:v}))}/><Sel label="Coating" value={corrIn.coating} onChange={v=>setCorrIn(p=>({...p,coating:v}))} options={[{v:"good",l:"Good"},{v:"fair",l:"Fair"},{v:"poor",l:"Poor"}]}/></>}
          </Card></div>
        </div>
        <div>
          <div style={{background:S.c1,borderRadius:8,border:`2px solid ${res?.rate>1?"#ef4444":res?.rate>0.3?S.ac:"#10b981"}`,padding:20,marginBottom:12,textAlign:"center"}}>
            <div style={{fontSize:10,color:S.dm,textTransform:"uppercase"}}>Estimated Corrosion Rate</div>
            <div style={{fontSize:38,fontWeight:900,fontFamily:"monospace",color:res?.rate>1?"#ef4444":res?.rate>0.3?S.ac:"#10b981"}}>{res?res.rate.toFixed(3):"—"}</div>
            <div style={{fontSize:13,color:S.dm}}>mm/year</div>
            {res&&<div style={{fontSize:11,color:S.tx,marginTop:8,background:"#080d17",borderRadius:6,padding:8,display:"inline-block"}}>{res.note}</div>}
          </div>
          <Card title="Temperature Sensitivity" accent={S.ac}>
            <ResponsiveContainer width="100%" height={200}>
              <AreaChart data={sens} margin={{top:5,right:20,left:0,bottom:5}}>
                <CartesianGrid strokeDasharray="3 3" stroke={S.bd}/><XAxis dataKey="temp" tick={{fontSize:9,fill:S.dm}} label={{value:"°C",position:"bottom",fontSize:9,fill:S.dm}}/>
                <YAxis tick={{fontSize:9,fill:S.dm}} label={{value:"mm/yr",angle:-90,position:"left",fontSize:9,fill:S.dm}}/>
                <Tooltip {...TT} formatter={v=>[`${v.toFixed(3)} mm/yr`,"Rate"]}/><Area type="monotone" dataKey="rate" stroke="#f59e0b" fill="#f59e0b20" strokeWidth={2}/>
              </AreaChart>
            </ResponsiveContainer>
          </Card>
        </div>
      </div>
    );
  };

  // ================================================================
  // TAB 6: MANAGEMENT SYSTEMS
  // ================================================================
  const renderMgmt=()=>(
    <div style={{display:"grid",gridTemplateColumns:"1fr 300px",gap:12}}>
      <Card title="PSM Evaluation (API 581 Annex 2.A)" accent={S.ac}>
        {MGMT_AREAS.map(a=>(
          <div key={a.id} style={{marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}><span style={{fontSize:11,color:S.tx}}>{a.n}</span><span style={{fontSize:11,fontFamily:"monospace",color:S.ac}}>{mgmt[a.id]||0}/{a.mx}</span></div>
            <div style={{display:"flex",gap:6,alignItems:"center"}}><input type="range" min={0} max={a.mx} value={mgmt[a.id]||0} onChange={e=>setMgmt(p=>({...p,[a.id]:+e.target.value}))} style={{flex:1,accentColor:S.ac}}/><span style={{fontSize:10,color:S.mt,width:32,textAlign:"right"}}>{((mgmt[a.id]||0)/a.mx*100).toFixed(0)}%</span></div>
          </div>
        ))}
      </Card>
      <div>
        <Card title="Results" accent="#10b981">
          <Box w="100%" label="Score" value={`${fmsR.ps.toFixed(1)}%`} color={fmsR.ps>70?"#10b981":fmsR.ps>50?"#eab308":"#ef4444"}/>
          <div style={{marginTop:8}}><Box w="100%" label="FMS Factor" value={fmsR.fms.toFixed(4)} color={fmsR.fms>1?"#ef4444":"#10b981"}/></div>
          <div style={{marginTop:8,background:"#080d17",borderRadius:6,padding:8,fontSize:10,fontFamily:"monospace",color:S.dm}}>
            FMS = 10^(-0.02×{fmsR.ps.toFixed(1)}+1) = <span style={{color:S.ac,fontWeight:700}}>{fmsR.fms.toFixed(4)}</span>
          </div>
          <div style={{marginTop:6,fontSize:10,color:fmsR.fms>1?"#ef4444":"#10b981"}}>{fmsR.fms>1?"⚠ FMS>1.0 increases all POF":"✓ FMS<1.0 reduces POF"}</div>
        </Card>
        <div style={{marginTop:12}}><Card title="Impact Preview" accent="#3b82f6">
          <div style={{fontSize:11}}>{assessed.slice(0,6).map(a=>(
            <div key={a.id} style={{display:"flex",justifyContent:"space-between",padding:"3px 0",borderBottom:`1px solid ${S.bd}`}}>
              <span style={{fontFamily:"monospace",color:S.tx}}>{a.id}</span><Badge text={a.risk.lv} color={RC[a.risk.lv]}/>
            </div>
          ))}</div>
        </Card></div>
      </div>
    </div>
  );

  // ================================================================
  // RENDER
  // ================================================================
  const tabs=[
    {id:"analytics",l:"📊 Analytics"},{id:"entry",l:"📝 Data Entry"},
    {id:"detail",l:"🔧 Detail & Inspection"},{id:"dm",l:"🔬 Damage Mechanisms"},
    {id:"corr",l:"🧪 Corr. Rate Calc"},{id:"mgmt",l:"📋 Mgmt Systems"},
  ];

  return(
    <div style={{background:S.bg,minHeight:"100vh",color:S.tx,fontFamily:"'Inter','Segoe UI',system-ui,sans-serif"}}>
      <div style={{background:"linear-gradient(135deg,#0c1222,#162032)",borderBottom:`1px solid ${S.bd}`,padding:"9px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:32,height:32,background:"linear-gradient(135deg,#f59e0b,#b45309)",borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:12,color:"#000"}}>RBI</div>
          <div><div style={{fontSize:13,fontWeight:800}}>RBI ASSESSMENT ENGINE</div><div style={{fontSize:9,color:S.mt}}>API 580 / 581 — Complete Assessment Suite</div></div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10,fontSize:10}}>
          <span style={{color:S.dm}}>{assessed.length} equip</span>
          {stats.hi>0&&<Badge text={`${stats.hi} High`} color="#ef4444"/>}
          <span style={{color:fmsR.fms>1?"#ef4444":"#10b981",fontWeight:700}}>FMS:{fmsR.fms.toFixed(3)}</span>
          {sel&&<span style={{color:S.ac,fontFamily:"monospace"}}>[{sel.id}]</span>}
        </div>
      </div>
      <div style={{display:"flex",overflowX:"auto",borderBottom:`1px solid ${S.bd}`,background:S.c1}}>
        {tabs.map(t=><Tab key={t.id} active={tab===t.id} onClick={()=>setTab(t.id)}>{t.l}</Tab>)}
      </div>
      <div style={{padding:"14px 18px",maxWidth:1400,margin:"0 auto"}}>
        {tab==="analytics"&&renderAnalytics()}
        {tab==="entry"&&renderEntry()}
        {tab==="detail"&&renderDetail()}
        {tab==="dm"&&renderDM()}
        {tab==="corr"&&renderCorr()}
        {tab==="mgmt"&&renderMgmt()}
      </div>
      <div style={{padding:"8px 18px",borderTop:`1px solid ${S.bd}`,textAlign:"center",fontSize:9,color:S.mt}}>RBI Engine — API RP 580 3rd Ed. & API RP 581 3rd Ed. (2016) — For engineering use only</div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
